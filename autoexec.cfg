sv_cheats "1" // Enables cheat commands (required for certain advanced or debugging commands).
adsp_debug "0" // Disables audio debugging (useful for diagnosing sound issues).
battery_saver "false" // Disables battery saver mode.
bind "k" "+voicerecord"    // Binds the "k" key to start/stop voice recording in-game
bind "LEFTARROW" "cl_mute_all_but_friends_and_party 2"  // Enables auto-mute (only friends and party members are audible)
bind "RIGHTARROW" "cl_mute_all_but_friends_and_party 0"  // Disables auto-mute (everyone is audible)
bind scancode66 "volume 0" // Binds a key F9 to set volume to 0.
bind scancode67 "exec autoexec.cfg" // Binds a key F11 to execute the autoexec.cfg configuration file.
bind scancode69 "jpeg" // Binds a key F12 to take a JPEG screenshot.
cl_auto_cursor_scale "true" // Enables automatic cursor scaling.
cl_autohelp "false" // Disables auto-help.
cl_clanid "0" // Sets the clan ID to 0 (no clan).
cl_color "0" // Sets the team color to 0.
cl_crosshair_friendly_warning "1" // Enables friendly fire warning in the crosshair.
cl_crosshair_recoil "0"   // Disables crosshair recoil visualization (crosshair stays static even when firing)
cl_crosshairalpha "200" // Sets the crosshair transparency.
cl_crosshaircolor "1" // Sets the crosshair color.
cl_crosshaircolor_b "50" // Sets the blue component of the crosshair color.
cl_crosshaircolor_g "250" // Sets the green component of the crosshair color.
cl_crosshaircolor_r "50" // Sets the red component of the crosshair color.
cl_crosshairdot "0" // Disables the crosshair dot.
cl_crosshairgap "0" // Sets the crosshair gap.
cl_crosshairsize "5" // Sets the crosshair size.
cl_crosshairstyle "4" // Sets the crosshair style.
cl_crosshairthickness "0.5" // Sets the crosshair thickness.
cl_crosshairusealpha "1" // Enables transparency for the crosshair.
cl_cursor_scale "1.000000" // Sets the cursor scale.
cl_deathcampanel_position_dynamic "1" // Enables dynamic positioning of the death cam panel.
cl_disable_round_end_report "false" // Disables the end-of-round report.
cl_embedded_stream_audio_volume "0.000000" // Sets the embedded stream audio volume to 0.
cl_embedded_stream_audio_volume_xmaster "true" // Uses the master volume for the embedded stream.
cl_force_spec_hud_color_to_team "false" // Disables forcing spectator HUD color to team color.
cl_graphics_driver_warning_dont_show_again "false" // Disables the option to not show the graphics driver warning again.
cl_hud_color "7" // Sets the HUD color.
cl_hud_radar_background_alpha "0.627000" // Sets the radar background transparency.
cl_hud_radar_blur_background "true" // Enables radar background blur.
cl_hud_radar_map_additive "true" // Enables additive radar map display.
cl_hud_radar_scale "1.000000" // Sets the radar scale.
cl_hud_telemetry_frametime_poor "100.000000" // Sets the poor frame time threshold for telemetry.
cl_hud_telemetry_frametime_poor 100.000000 // Threshold in ms for poor frametime alerts
cl_hud_telemetry_frametime_show 0 // Disables the frametime/FPS display in the HUD
cl_hud_telemetry_net_detailed 0 // Disables detailed network information display
cl_hud_telemetry_net_misdelivery_poor 5.000000 // Threshold percentage for packet loss/misdelivery alerts
cl_hud_telemetry_net_misdelivery_show 0 // Disables the packet loss/misdelivery display
cl_hud_telemetry_net_quality_graph_show 0 // Disables the network quality graph
cl_hud_telemetry_ping_poor 100.000000 // Threshold in ms for high ping alerts
cl_hud_telemetry_ping_show 0 // Disables the ping display in the HUD
cl_hud_telemetry_serverrecvmargin_graph_show 0 // Disables the server receive margin graph
con_enable "1" // Enables the console.
fps_max "0" // Sets the maximum frames per second to 0 for the game.
fps_max_ui "0" // Sets the maximum frames per second to 0 for the UI.
hud_scaling "1.0" // Sets the HUD scaling.
hud_showtargetid "0" // Disables target ID display in the HUD.
mm_dedicated_search_maxping "25" // Sets the maximum ping for dedicated server search.
r_show_build_info "false" // Disables build info display.
sensitivity "2.93" // Sets the mouse sensitivity.
snd_mixahead "0.025" //  Reduces audio delay, making sure sounds are heard in real time.
snd_musicvolume "0" // Sets the music volume to 0.
viewmodel_fov "62.5" // Sets the viewmodel field of view.
viewmodel_offset_x "2" // Sets the X offset of the viewmodel.
viewmodel_offset_y "2" // Sets the Y offset of the viewmodel.
viewmodel_offset_z "-2" // Sets the Z offset of the viewmodel.
viewmodel_presetpos "3" // Sets the preset position of the viewmodel.
volume "1" // Sets the master volume to 1.
zoom_sensitivity_ratio "0.74" // Sets the zoom sensitivity ratio.
host_writeconfig // Saves the current configuration.
clear // Clear console output.
